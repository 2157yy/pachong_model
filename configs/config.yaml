# 项目配置文件
# 用于爬虫、数据预处理和模型训练的参数配置

# ==================== 爬虫配置 ====================
crawler:
  # 浏览器配置
  headless: true            # 调试时可改为 false
  proxy: null               # 代理地址，如 "http://proxy:port"
  user_agent: null          # User-Agent，null 使用默认
  locale: "zh-CN"
  timezone_id: "Asia/Shanghai"
  navigation_timeout_ms: 45000
  viewport_width: 1440
  viewport_height: 960
  
  # 爬取配置
  max_comments: 100         # 单个视频/笔记最大评论数
  scroll_times: 8           # 页面滚动次数
  request_delay: 2.0        # 基础请求间隔（秒）
  request_delay_jitter: 1.0 # 随机抖动（秒）
  export_formats: ["json", "jsonl", "csv"]
  
  # 抖音配置
  douyin:
    enabled: true
    output_prefix: "douyin"
    storage_state: null
    save_storage_state: null
    cookies_file: null
  
  # 小红书配置
  xiaohongshu:
    enabled: true
    output_prefix: "xiaohongshu"
    storage_state: null
    save_storage_state: null
    cookies_file: null


# ==================== 数据预处理配置 ====================
preprocess:
  # 数据过滤
  min_length: 10            # 最小文本长度
  max_length: 512           # 最大文本长度
  min_likes: 0              # 最小点赞数
  
  # 数据集划分
  train_ratio: 0.8          # 训练集比例
  val_ratio: 0.1            # 验证集比例
  test_ratio: 0.1           # 测试集比例
  shuffle: true             # 是否打乱数据
  
  # 输出配置
  output_prefix: "dataset"  # 输出文件前缀


# ==================== 伪标签配置 ====================
labeler:
  # 点赞数阈值
  like_threshold_high: 1000
  like_threshold_low: 100
  
  # 收藏数阈值
  collect_threshold_high: 500
  collect_threshold_low: 50
  
  # 评论数阈值
  comment_threshold_high: 100
  comment_threshold_low: 20
  
  # 内容长度阈值
  content_length_high: 200
  content_length_low: 50
  
  # 互动率阈值
  engagement_rate_high: 0.05
  engagement_rate_low: 0.01


# ==================== 模型配置 ====================
model:
  # 模型选择
  name: "ernie-3.0-base"    # 预训练模型名称
  num_labels: 3             # 分类数量（low/medium/high）
  max_length: 512           # 最大序列长度
  backend: "auto"           # auto / paddle / sklearn
  
  # 训练配置
  learning_rate: 2.0e-5     # 学习率
  batch_size: 32            # 批次大小
  epochs: 5                 # 训练轮数
  warmup_ratio: 0.1         # 预热比例
  
  # 设备配置
  device: "cpu"             # 有 GPU/Paddle 环境时改成 iluvatar_gpu:0 或 gpu:0
  
  # 输出配置
  output_dir: "checkpoints" # 模型保存目录
  save_name: "best_model"   # 最佳模型名称


# ==================== 日志配置 ====================
logging:
  level: "INFO"             # 日志级别
  rotation: "1 day"         # 日志轮转
  retention: "7 days"       # 日志保留时间


# ==================== 路径配置 ====================
paths:
  data_dir: "data"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
